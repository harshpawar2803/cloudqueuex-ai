<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - CloudQueueX AI</title>
</head>
<body style="background:#0f172a;color:white;font-family:Arial;text-align:center;padding-top:50px;">

<h1>☁️ CloudQueueX AI</h1>

<h2>Create Account</h2>

<form action="/register" method="POST">

    <input type="text"
           name="name"
           placeholder="Full Name"
           required
           style="width:300px;padding:12px;margin:10px;"><br>

    <input type="email"
           name="email"
           placeholder="Email Address"
           required
           style="width:300px;padding:12px;margin:10px;"><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required
           style="width:300px;padding:12px;margin:10px;"><br>

    <button type="submit"
            style="padding:12px 25px;">
        Sign Up
    </button>

</form>

<br>

<a href="/login" style="color:#38bdf8;">
    Already have an account? Login
</a>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudQueueX AI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <nav>

        <div class="logo">
            ☁️ CloudQueueX AI
        </div>

        <div class="menu">
            <a href="/">Home</a>
            <a href="/search">Track Ticket</a>
            <a href="/login">Login</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/architecture">Architecture</a>
        </div>

    </nav>

    <section class="hero">

        <h1>CloudQueueX AI</h1>

        <p>
            AI-Powered Event-Driven Ticket Processing Platform on AWS
        </p>

    </section>

    <section class="ticket-form">

        <h2>Create Support Ticket</h2>

        <form action="/submit" method="POST">

            <input type="text" name="name" placeholder="Full Name" required>

            <input type="email" name="email" placeholder="Email Address" required>

            <select name="team" required>

                <option value="">Select Team</option>

                <option>Infrastructure</option>
                <option>Networking</option>
                <option>DevOps</option>
                <option>Security</option>
                <option>Billing</option>

            </select>

            <input type="text" name="subject" placeholder="Ticket Subject" required>

            <textarea name="issue" placeholder="Describe your issue" required></textarea>

            <button type="submit">
                Submit Ticket
            </button>

        </form>

    </section>

</body>

</html>

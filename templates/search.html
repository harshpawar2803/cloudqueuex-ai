<!DOCTYPE html>
<html>
<head>
    <title>Track Ticket - CloudQueueX AI</title>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: #111827;
            border-bottom: 1px solid #1f2937;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #38bdf8;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 60px auto;
            background: #111827;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #1f2937;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #1e293b;
            color: white;
            font-size: 15px;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, #0ea5e9, #2563eb);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.92;
        }

        .error {
            background: #7f1d1d;
            color: #fecaca;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #dc2626;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">☁️ CloudQueueX AI</div>
        <a href="/" style="color: #38bdf8;">← Home</a>
    </div>

    <div class="container">
        <h2>🔍 Track Your Ticket</h2>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/track">
            <label>Enter Ticket ID</label>
            <input type="text" name="ticket_id" placeholder="e.g., a1b2c3d4-5678..." required>
            <button type="submit">Search Ticket</button>
        </form>

        <a href="/">← Back to Home</a>
    </div>

</body>
</html>
